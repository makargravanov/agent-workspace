name: agent-workspace

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_workspace}
      POSTGRES_USER: ${POSTGRES_USER:-agent_workspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_workspace} -d ${POSTGRES_DB:-agent_workspace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      API_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_workspace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_workspace}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-}
      GITHUB_OAUTH_SUCCESS_REDIRECT_PATH: ${GITHUB_OAUTH_SUCCESS_REDIRECT_PATH:-/}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
