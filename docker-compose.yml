services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_workspace
      POSTGRES_USER: agent_workspace
      POSTGRES_PASSWORD: agent_workspace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_workspace -d agent_workspace"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      API_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://agent_workspace:agent_workspace@postgres:5432/agent_workspace
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

  mcp-bridge:
    build:
      context: .
      dockerfile: infra/docker/mcp-bridge.Dockerfile
    restart: unless-stopped
    environment:
      AGENT_WORKSPACE_API_URL: http://api:8080
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
