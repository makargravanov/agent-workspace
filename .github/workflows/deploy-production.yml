name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      REMOTE_APP_DIR: /opt/agent-workspace
      REMOTE_WEB_DIR: /var/www/agent-workspace
      API_HOST_PORT: "18080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Pack backend source
        run: |
          tar \
            --exclude ".git" \
            --exclude ".idea" \
            --exclude ".serena" \
            --exclude ".VSCodeCounter" \
            --exclude "target" \
            --exclude "web/node_modules" \
            --exclude "web/dist" \
            -cf agent-workspace-deploy.tar .

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"
          : "${DEPLOY_PORT:?DEPLOY_SSH_PORT secret is required}"
          : "${DEPLOY_SSH_PRIVATE_KEY:?DEPLOY_SSH_PRIVATE_KEY secret is required}"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          if ! ssh-keyscan -p "$DEPLOY_PORT" -T 10 -H "$DEPLOY_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null; then
            echo "Failed to fetch SSH host key from $DEPLOY_HOST:$DEPLOY_PORT. Check DEPLOY_HOST / DEPLOY_SSH_PORT and server reachability." >&2
            exit 1
          fi

      - name: Upload release
        timeout-minutes: 3
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          SSH_TARGET="$DEPLOY_USER@$DEPLOY_HOST"
          ssh $SSH_OPTS -p "$DEPLOY_PORT" "$SSH_TARGET" \
            "mkdir -p '${REMOTE_APP_DIR}/releases/current' '${REMOTE_WEB_DIR}'"
          scp $SSH_OPTS -P "$DEPLOY_PORT" agent-workspace-deploy.tar \
            "$SSH_TARGET:/tmp/agent-workspace-deploy.tar"
          ssh $SSH_OPTS -p "$DEPLOY_PORT" "$SSH_TARGET" \
            "rm -rf '${REMOTE_APP_DIR}/releases/current' && mkdir -p '${REMOTE_APP_DIR}/releases/current' && tar --warning=no-timestamp -xf /tmp/agent-workspace-deploy.tar -C '${REMOTE_APP_DIR}/releases/current' && rm /tmp/agent-workspace-deploy.tar"
          rsync -az --delete -e "ssh $SSH_OPTS -p $DEPLOY_PORT" web/dist/ \
            "$SSH_TARGET:${REMOTE_WEB_DIR}/"
          scp $SSH_OPTS -P "$DEPLOY_PORT" deploy/nginx/wspace.cleadwine.ru.conf \
            "$SSH_TARGET:/tmp/wspace.cleadwine.ru.conf"

      - name: Restart backend and reload nginx
        timeout-minutes: 3
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/agent-workspace/releases/current

          if [ ! -f /opt/agent-workspace/.env ]; then
            cat > /opt/agent-workspace/.env <<ENV
          POSTGRES_DB=agent_workspace
          POSTGRES_USER=agent_workspace
          POSTGRES_PASSWORD=${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
          API_HOST_PORT=18080
          ENV
          fi

          docker compose --env-file /opt/agent-workspace/.env -f deploy/production/docker-compose.yml up -d --build
          if [ ! -f /etc/nginx/sites-available/wspace.cleadwine.ru ]; then
            install -o root -g root -m 0644 /tmp/wspace.cleadwine.ru.conf /etc/nginx/sites-available/wspace.cleadwine.ru
            ln -sfn /etc/nginx/sites-available/wspace.cleadwine.ru /etc/nginx/sites-enabled/wspace.cleadwine.ru
          fi
          chown -R www-data:www-data /var/www/agent-workspace
          nginx -t
          systemctl reload nginx
          EOF
