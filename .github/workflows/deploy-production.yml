name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      REMOTE_APP_DIR: /opt/agent-workspace
      REMOTE_WEB_DIR: /var/www/agent-workspace
      API_HOST_PORT: "18080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Pack backend source
        run: |
          tar \
            --exclude ".git" \
            --exclude ".idea" \
            --exclude ".serena" \
            --exclude ".VSCodeCounter" \
            --exclude "target" \
            --exclude "web/node_modules" \
            --exclude "web/dist" \
            -cf agent-workspace-deploy.tar .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${REMOTE_APP_DIR}/releases/current' '${REMOTE_WEB_DIR}'"
          scp -i ~/.ssh/deploy_key agent-workspace-deploy.tar \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/agent-workspace-deploy.tar"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "rm -rf '${REMOTE_APP_DIR}/releases/current' && mkdir -p '${REMOTE_APP_DIR}/releases/current' && tar --warning=no-timestamp -xf /tmp/agent-workspace-deploy.tar -C '${REMOTE_APP_DIR}/releases/current' && rm /tmp/agent-workspace-deploy.tar"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" web/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${REMOTE_WEB_DIR}/"
          scp -i ~/.ssh/deploy_key deploy/nginx/wspace.cleadwine.ru.conf \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/wspace.cleadwine.ru.conf"

      - name: Restart backend and reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail
          cd /opt/agent-workspace/releases/current

          if [ ! -f /opt/agent-workspace/.env ]; then
            cat > /opt/agent-workspace/.env <<ENV
          POSTGRES_DB=agent_workspace
          POSTGRES_USER=agent_workspace
          POSTGRES_PASSWORD=${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
          API_HOST_PORT=18080
          ENV
          fi

          docker compose --env-file /opt/agent-workspace/.env -f deploy/production/docker-compose.yml up -d --build
          if [ ! -f /etc/nginx/sites-available/wspace.cleadwine.ru ]; then
            install -o root -g root -m 0644 /tmp/wspace.cleadwine.ru.conf /etc/nginx/sites-available/wspace.cleadwine.ru
            ln -sfn /etc/nginx/sites-available/wspace.cleadwine.ru /etc/nginx/sites-enabled/wspace.cleadwine.ru
          fi
          chown -R www-data:www-data /var/www/agent-workspace
          nginx -t
          systemctl reload nginx
          EOF
